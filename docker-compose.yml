# docker-compose.yml — Hyperledger Fabric network + IPFS node

version: '3.8'

networks:
  securitylog_net:
    name: securitylog_net

volumes:
  orderer.securitylog.com:
  peer0.cloudsec.securitylog.com:
  peer1.cloudsec.securitylog.com:
  ipfs_staging:
  ipfs_data:

services:

  # ── Orderer ──────────────────────────────────────────────────────────────────
  orderer.securitylog.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.securitylog.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./blockchain/network/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./blockchain/network/crypto-config/ordererOrganizations/securitylog.com/orderers/orderer.securitylog.com/msp:/var/hyperledger/orderer/msp
      - ./blockchain/network/crypto-config/ordererOrganizations/securitylog.com/orderers/orderer.securitylog.com/tls:/var/hyperledger/orderer/tls
      - orderer.securitylog.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - securitylog_net

  # ── Peer 0 ───────────────────────────────────────────────────────────────────
  peer0.cloudsec.securitylog.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.cloudsec.securitylog.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=securitylog_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.cloudsec.securitylog.com
      - CORE_PEER_ADDRESS=peer0.cloudsec.securitylog.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.cloudsec.securitylog.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.cloudsec.securitylog.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.cloudsec.securitylog.com:7051
      - CORE_PEER_LOCALMSPID=CloudSecOrgMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    depends_on:
      - couchdb0
    volumes:
      - /var/run/:/host/var/run/
      - ./blockchain/network/crypto-config/peerOrganizations/cloudsec.securitylog.com/peers/peer0.cloudsec.securitylog.com/msp:/etc/hyperledger/fabric/msp
      - ./blockchain/network/crypto-config/peerOrganizations/cloudsec.securitylog.com/peers/peer0.cloudsec.securitylog.com/tls:/etc/hyperledger/fabric/tls
      - peer0.cloudsec.securitylog.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
    networks:
      - securitylog_net

  # ── Peer 1 ───────────────────────────────────────────────────────────────────
  peer1.cloudsec.securitylog.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer1.cloudsec.securitylog.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=securitylog_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer1.cloudsec.securitylog.com
      - CORE_PEER_ADDRESS=peer1.cloudsec.securitylog.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer1.cloudsec.securitylog.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.cloudsec.securitylog.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.cloudsec.securitylog.com:8051
      - CORE_PEER_LOCALMSPID=CloudSecOrgMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    depends_on:
      - couchdb1
    volumes:
      - /var/run/:/host/var/run/
      - ./blockchain/network/crypto-config/peerOrganizations/cloudsec.securitylog.com/peers/peer1.cloudsec.securitylog.com/msp:/etc/hyperledger/fabric/msp
      - ./blockchain/network/crypto-config/peerOrganizations/cloudsec.securitylog.com/peers/peer1.cloudsec.securitylog.com/tls:/etc/hyperledger/fabric/tls
      - peer1.cloudsec.securitylog.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "8051:8051"
    networks:
      - securitylog_net

  # ── CouchDB for peer0 ────────────────────────────────────────────────────────
  couchdb0:
    image: couchdb:3.3
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - securitylog_net

  # ── CouchDB for peer1 ────────────────────────────────────────────────────────
  couchdb1:
    image: couchdb:3.3
    container_name: couchdb1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    networks:
      - securitylog_net

  # ── Fabric CA ─────────────────────────────────────────────────────────────────
  ca.cloudsec.securitylog.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.cloudsec.securitylog.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-cloudsec
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
    volumes:
      - ./blockchain/network/crypto-config/peerOrganizations/cloudsec.securitylog.com/ca/:/etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    ports:
      - "7054:7054"
      - "17054:17054"
    networks:
      - securitylog_net

  # ── IPFS node ─────────────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs_node
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    networks:
      - securitylog_net

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - securitylog_net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - securitylog_net
