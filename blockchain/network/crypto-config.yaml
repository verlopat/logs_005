# crypto-config.yaml — cryptogen topology for the SecurityLog network

OrdererOrgs:
  - Name: Orderer
    Domain: securitylog.com
    Specs:
      - Hostname: orderer

PeerOrgs:
  - Name: CloudSecOrg
    Domain: cloudsec.securitylog.com
    EnableNodeOUs: true
    Template:
      Count: 2         # peer0, peer1
    Users:
      Count: 2         # User1 = detection agent; User2 = auditor
