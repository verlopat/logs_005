# prometheus.yml — scrapes Fabric peer metrics + Python app metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fabric_peer0'
    static_configs:
      - targets: ['peer0.cloudsec.securitylog.com:9443']

  - job_name: 'fabric_peer1'
    static_configs:
      - targets: ['peer1.cloudsec.securitylog.com:9444']

  - job_name: 'security_logger_app'
    static_configs:
      - targets: ['host.docker.internal:8000']
